<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whishper YouTube Captions</title>
    <style>
      body {
        margin: 0;
        color: #172018;
        background:
          radial-gradient(circle at 80% 12%, rgba(34, 197, 94, 0.26), transparent 28%),
          linear-gradient(135deg, #f6f3e8, #dbe7cf);
        font-family: ui-serif, Georgia, serif;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 420px;
        gap: 48px;
        min-height: 100vh;
        box-sizing: border-box;
        padding: clamp(28px, 8vw, 92px);
        align-items: center;
      }

      .eyebrow {
        margin: 0 0 18px;
        font: 800 13px/1 ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(44px, 8vw, 96px);
        line-height: 0.92;
        letter-spacing: -0.06em;
      }

      .intro {
        max-width: 560px;
        color: #445244;
        font: 500 20px/1.5 ui-sans-serif, system-ui, sans-serif;
      }

      form {
        display: grid;
        gap: 16px;
        padding: 24px;
        border: 1px solid rgba(23, 32, 24, 0.12);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.54);
        box-shadow: 0 24px 70px rgba(41, 56, 39, 0.18);
        backdrop-filter: blur(18px);
      }

      label {
        display: grid;
        gap: 8px;
        font: 800 13px/1 ui-sans-serif, system-ui, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      input,
      select {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid rgba(23, 32, 24, 0.18);
        border-radius: 14px;
        padding: 13px 14px;
        color: #172018;
        background: rgba(255, 255, 255, 0.76);
        font: 600 15px/1.2 ui-sans-serif, system-ui, sans-serif;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        color: #ecfdf5;
        background: #166534;
        cursor: pointer;
        font: 900 15px/1 ui-sans-serif, system-ui, sans-serif;
      }

      .message {
        margin: 0;
        color: #166534;
        font: 700 14px/1.3 ui-sans-serif, system-ui, sans-serif;
      }

      @media (max-width: 860px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
